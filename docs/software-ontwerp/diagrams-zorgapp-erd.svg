<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e5e5" stroke-width="0.5"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/></marker>
  </defs>
  <rect width="1200" height="650" fill="#fafafa"/>
  <rect width="1200" height="650" fill="url(#grid)"/>
  <text x="40" y="40" font-family="monospace" font-size="14" fill="#333" font-weight="bold">ZORGAPP_DATA_MODEL</text>
  <text x="205" y="40" font-family="monospace" font-size="12" fill="#888">[ ERD ]</text>

  <g font-family="monospace" font-size="10" fill="#333">
    <rect x="480" y="70" width="240" height="140" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="600" y="95" text-anchor="middle" font-weight="bold" fill="#3498db">ASP_NET_USERS / USER</text>
    <line x1="480" y1="105" x2="720" y2="105" stroke="#ccc"/>
    <text x="490" y="125">PK Id: string</text>
    <text x="490" y="142">Email: string</text>
    <text x="490" y="159">PasswordHash: string</text>
    <text x="490" y="176">... Identity fields ...</text>
    <text x="490" y="195" fill="#999">source: ASP.NET Identity Dapper stores</text>

    <rect x="70" y="300" width="240" height="150" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <text x="190" y="325" text-anchor="middle" font-weight="bold" fill="#27ae60">PATIENTS</text>
    <line x1="70" y1="335" x2="310" y2="335" stroke="#ccc"/>
    <text x="80" y="355">PK ID: int</text>
    <text x="80" y="372">Voornaam: string</text>
    <text x="80" y="389">Achternaam: string</text>
    <text x="80" y="406">Geboortedatum: string</text>
    <text x="80" y="423">TrajectID: int</text>
    <text x="80" y="440">FK UserId: string</text>

    <rect x="340" y="300" width="240" height="150" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
    <text x="460" y="325" text-anchor="middle" font-weight="bold" fill="#9b59b6">DAGBOEKEN</text>
    <line x1="340" y1="335" x2="580" y2="335" stroke="#ccc"/>
    <text x="350" y="355">PK ID: int</text>
    <text x="350" y="372">Title: string</text>
    <text x="350" y="389">Contents: string</text>
    <text x="350" y="406">FK UserId: string</text>
    <text x="350" y="423" fill="#e74c3c">Unity model also expects date: string</text>

    <rect x="610" y="300" width="240" height="150" fill="#fff" stroke="#f39c12" stroke-width="2"/>
    <text x="730" y="325" text-anchor="middle" font-weight="bold" fill="#f39c12">AFSPRAKEN</text>
    <line x1="610" y1="335" x2="850" y2="335" stroke="#ccc"/>
    <text x="620" y="355">PK ID: Guid</text>
    <text x="620" y="372">Titel: string</text>
    <text x="620" y="389">NaamDokter: string</text>
    <text x="620" y="406">DatumTijd: string</text>
    <text x="620" y="423">Actief: int</text>
    <text x="620" y="440">FK UserId: string</text>

    <rect x="880" y="300" width="250" height="170" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
    <text x="1005" y="325" text-anchor="middle" font-weight="bold" fill="#e74c3c">CHARACTERS</text>
    <line x1="880" y1="335" x2="1130" y2="335" stroke="#ccc"/>
    <text x="890" y="355">PK ID: int</text>
    <text x="890" y="372">HairColor: string</text>
    <text x="890" y="389">SkinColor: string</text>
    <text x="890" y="406">EyeColor: string</text>
    <text x="890" y="423">Gender: string</text>
    <text x="890" y="440">SpacesuitColor: string</text>
    <text x="890" y="457">Hat: string</text>
    <text x="890" y="474">FK UserId: string</text>
  </g>

  <g stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 560 210 L 200 300"/>
    <path d="M 590 210 L 460 300"/>
    <path d="M 610 210 L 730 300"/>
    <path d="M 640 210 L 1005 300"/>
  </g>

  <g font-family="monospace" font-size="9" fill="#27ae60">
    <text x="350" y="260">1 user -> many patients</text>
    <text x="500" y="250">1 user -> many dagboeken</text>
    <text x="690" y="250">1 user -> many afspraken</text>
    <text x="885" y="260">1 user -> 0..many characters in schema</text>
  </g>

  <rect x="330" y="515" width="540" height="80" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="600" y="542" font-family="monospace" font-size="11" fill="#666" text-anchor="middle">ERD_INTERPRETATION</text>
  <text x="600" y="562" font-family="monospace" font-size="10" fill="#999" text-anchor="middle">De repositories filteren alle functionele tabellen op UserId. Daardoor is gegevensscheiding per gebruiker het</text>
  <text x="600" y="578" font-family="monospace" font-size="10" fill="#999" text-anchor="middle">centrale relationele ontwerpprincipe. De Unity-client ziet alleen records die via de API aan de ingelogde gebruiker zijn gekoppeld.</text>

  <text x="600" y="625" font-family="monospace" font-size="10" fill="#999" text-anchor="middle">erd derived from actual C# models and repository sql in the webapi repository</text>
</svg>